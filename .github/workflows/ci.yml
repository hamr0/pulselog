# CI — runs on every push and PR. Mirrors the publish.yml gate (typecheck →
# build types → test) so a JSDoc/code mismatch or a failing test blocks merge.
# No lint step: tsc covers the bug class and ESLint cuts against the dep hierarchy.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # least privilege: CI only needs to read the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (JSDoc/code anti-drift)
        run: npm run typecheck
      - name: Build types (.d.ts generate cleanly)
        run: npm run build:types
      - name: Test
        run: npm test
